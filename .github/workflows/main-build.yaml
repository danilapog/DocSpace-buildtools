name: 4testing multiarch-build

on:
  repository_dispatch:
    types:
      - cron-trigger-action
      - config-trigger-action
      - client-trigger-action
      - server-trigger-action

jobs:
  aboba1:
    runs-on: ubuntu-latest
    steps:
      - name: Check
        env: 
          ARRAY: ${{ github.event.client_payload.branches }}
        run: echo "ARRAY[@]"
      
  call-reusable-build:
    uses: danilapog/DocSpace-buildtools/.github/workflows/reusable-build.yml@master
    with:
      payload-branches: ${{ github.event.client_payload.branches }}
      dispatch-type: ${{ github.event.action }}
