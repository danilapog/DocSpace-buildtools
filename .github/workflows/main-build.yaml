name: 4testing multiarch-build

on:
  repository_dispatch:
    types:
      - cron-trigger-action
      - config-trigger-action
      - client-trigger-action
      - server-trigger-action

jobs:
  prepare-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Check
        env: 
          ABOBA: ${{ github.event.client_payload.branches }}
        run: |
          echo ${ABOBA} | jq -R
          #echo "string-branches=$(echo ${{ github.event.client_payload.branches }} | jq -R)" >> "$GITHUB_ENV"
      
  call-reusable-build:
    uses: danilapog/DocSpace-buildtools/.github/workflows/reusable-build.yml@master
    with:
      payload-branches: ${{ github.event.client_payload.branches }}
      dispatch-type: ${{ github.event.action }}
